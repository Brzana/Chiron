version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: interintel_db
    restart: always
    environment:
      POSTGRES_USER: interintel_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: interintel_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: interintel_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@interintel.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
